<!DOCTYPE html>
<html>
<head>
    <title>Customer Segmentation</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            margin: 0;
        }

        h1 {
            margin-top: 20px;
        }

        form {
            margin-top: 20px;
        }

        input {
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            width: 220px;
        }

        button {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            background-color: black;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #333;
        }

        .card {
            background: white;
            color: black;
            margin: 40px auto;
            padding: 25px;
            width: 70%;
            border-radius: 20px;
            box-shadow: 0px 8px 20px rgba(0,0,0,0.2);
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<h1>Customer Segmentation System</h1>

<form action="/predict" method="post">
    <input type="number" name="income" min="10" max="150"
           placeholder="Annual Income (k$)" required>

    <input type="number" name="score" min="1" max="100"
           placeholder="Spending Score (1-100)" required>

    <br>

    <button type="submit">Predict Customer Type</button>
    <button type="button" onclick="window.location.href='/'">Reset</button>
</form>

<div class="card">
    {% if prediction %}
        <h2 style="font-size: 28px;">{{ prediction }}</h2>
        <p style="font-size: 18px; color: #333;">{{ info }}</p>
    {% endif %}

    {% if image_file %}
        <img src="{{ url_for('static', filename=image_file) }}" width="550">
    {% endif %}
</div>

</body>
</html>
